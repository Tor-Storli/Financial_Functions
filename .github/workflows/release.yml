name: Create Release
on:
  push:
    tags:
      - 'v*'
jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download all artifacts
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: extension-ci.yml
          workflow_conclusion: success
          path: artifacts/
      - name: Create Release and upload all extension files
        uses: softprops/action-gh-release@v2
        with:
          name: financial_functions ${{ github.ref_name }}
          body: Excel-compatible financial functions for DuckDB v1.5.2
          files: artifacts/**/*.duckdb_extension
          draft: false
          prerelease: false
